name: Update FC Week

on:
  workflow_dispatch:
    inputs:
      week:
        description: "Challenge week label, for example Week 2"
        required: true
        default: "Week 1"
      base_company_credits:
        description: "Base Company Credits, commas are OK"
        required: true
      target_company_credits:
        description: "Weekly target Company Credits"
        required: true
        default: "6000000"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update fc-week.json
        env:
          WEEK: ${{ inputs.week }}
          BASE_COMPANY_CREDITS: ${{ inputs.base_company_credits }}
          TARGET_COMPANY_CREDITS: ${{ inputs.target_company_credits }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          const week = process.env.WEEK.trim();
          const baseText = process.env.BASE_COMPANY_CREDITS.replaceAll(",", "").trim();
          const targetText = process.env.TARGET_COMPANY_CREDITS.replaceAll(",", "").trim();
          const baseCompanyCredits = Number(baseText);
          const targetCompanyCredits = Number(targetText);

          if (!/^Week [1-9]\d*$/.test(week)) {
            throw new Error("Week must look like: Week 1");
          }

          if (!Number.isSafeInteger(baseCompanyCredits) || baseCompanyCredits < 0) {
            throw new Error("Base Company Credits must be a whole number.");
          }

          if (!Number.isSafeInteger(targetCompanyCredits) || targetCompanyCredits <= 0) {
            throw new Error("Target Company Credits must be a whole number above zero.");
          }

          fs.writeFileSync("fc-week.json", JSON.stringify({
            week,
            baseCompanyCredits,
            targetCompanyCredits,
          }, null, 2) + "\n");
          NODE

      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fc-week.json
          git diff --cached --quiet && exit 0
          git commit -m "Update shared FC week"
          git push
